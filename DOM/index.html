<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM - Semana 4</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212; 
            color: white;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #00ff88;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover {
            background-color: #00cc6e;
        }
        #meu-paragrafo {
            font-size: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <p id="meu-paragrafo">Texto original (Aguardando clique...)</p>
    <button id="meu-botão">Alterar Texto</button>

    <script>
        const paragrafo = document.getElementById('meu-paragrafo');
        const botao = document.getElementById('meu-botão');

        botao.addEventListener('click', function() {
            paragrafo.innerText = "Texto alterado!";
            
            paragrafo.style.color = "#00ff88";
        });
    </script>

</body>
</html>
